        folding_rate: 0.82
      - name: "c_lobe"
        start: 91
        end: 162
        type: "EF_hand"
        function: "Structural Ca2+ binding"
        folding_rate: 0.85

# Dissociation constants (Kd) for key interactions — from literature
# Units: nM unless noted
binding_affinities:
  actin_myosin_rigor:
    partners: ["actin", "myosin_heavy_chain"]
    kd_nM: 10.0
    condition: "rigor (no ATP)"
    source: "Geeves & Holmes 2005"
  actin_myosin_weak:
    partners: ["actin", "myosin_heavy_chain"]
    kd_nM: 5000.0
    condition: "weakly-bound (ATP present)"
    source: "Geeves & Holmes 2005"
  troponin_i_troponin_c:
    partners: ["troponin_i", "troponin_c"]
    kd_nM: 2.0
    condition: "Ca2+ saturated"
    source: "Li et al. 2004"
  titin_myosin_rod:
    partners: ["titin", "myosin_heavy_chain"]
    kd_nM: 100.0
    condition: "A-band"
    source: "Labeit & Kolmerer 1995"

# Sarcomere assembly order (step index = priority)
assembly_order:
  - step: 1
    name: "Z_disk_nucleation"
    proteins: ["titin", "actin"]
    domains: ["Z_disk_Ig", "actin_monomer"]
    description: "Titin Z-disk anchors; actin nucleates at Z-disk"
  - step: 2
    name: "thin_filament_elongation"
    proteins: ["actin", "troponin_i", "troponin_c"]
    domains: ["actin_monomer", "inhibitory_region", "n_lobe"]
    description: "Actin polymerizes; troponin complex decorates thin filament"
  - step: 3
    name: "thick_filament_integration"
    proteins: ["myosin_heavy_chain"]
    domains: ["motor_domain", "rod_domain"]
    description: "Myosin rods self-assemble into thick filament backbone"
  - step: 4
    name: "titin_scaffold_attachment"
    proteins: ["titin", "myosin_heavy_chain"]
    domains: ["A_band_FnIII", "M_line_kinase", "rod_domain"]
    description: "Titin A-band spans thick filament; M-line kinase anchors"

# Therapy parameter space for optimization
therapy_space:
  leucine_dose_g:
    min: 0.0
    max: 10.0
    unit: "grams"
    effect: "mTOR activation → ribosomal synthesis rate multiplier"
    multiplier_formula: "1.0 + 0.15 * min(dose, 5.0)"
  rest_hours:
    min: 24.0
    max: 96.0
    unit: "hours"
    effect: "Recovery window before next training stimulus"
    optimal_range: [36, 72]
  sleep_quality:
    min: 0.0
    max: 1.0
    unit: "normalized score"
    effect: "Growth hormone secretion proxy → folding rate modifier"
    multiplier_formula: "0.7 + 0.6 * sleep_quality"
  body_temperature_c:
    min: 36.0
    max: 38.5
    unit: "Celsius"
    effect: "Protein folding kinetics (Arrhenius-like)"
    reference_temp: 37.0
    activation_energy_kJ: 50.0
