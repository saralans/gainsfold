      - name: "Z_disk_Ig"
        start: 1
        end: 800
        type: "Ig"
        function: "Z-disk anchoring"
        folding_rate: 0.85
      - name: "N2B_unique"
        start: 2100
        end: 2174
        type: "unstructured"
        function: "Elastic spring element"
        folding_rate: 0.40
      - name: "PEVK"
        start: 2174
        end: 3300
        type: "unstructured"
        function: "Extensible region, entropy spring"
        folding_rate: 0.35
      - name: "A_band_FnIII"
        start: 3300
